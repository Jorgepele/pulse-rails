# Render blueprint for pulse-rails.
# In the Render dashboard: New > Blueprint, connect this repo, and Render reads
# this file. See DEPLOY.md for the full walkthrough.
services:
  - type: web
    name: pulse-rails
    runtime: ruby
    plan: free
    # Install gems, then create/migrate the database and seed demo data.
    # (SQLite on the free tier is reset on each deploy, so we re-seed here.)
    buildCommand: "bundle install && bin/rails db:prepare"
    startCommand: "bin/rails server"
    envVars:
      # Content of config/master.key (kept out of git). Needed to decrypt
      # credentials for secret_key_base. Set this yourself in the dashboard.
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
